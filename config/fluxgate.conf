# FluxGate 默认配置。支持 # 或 ; 行内注释。

[server]
# 对外监听地址与端口。0.0.0.0 表示监听所有 IPv4 网卡。
listen_host = 0.0.0.0
listen_port = 8080

# Worker Reactor 数量。每个 Worker 独占一个线程和 epoll 实例。
workers = 4

# listen() backlog 提示值；实际有效上限还受系统 somaxconn 影响。
backlog = 1024

# 每个 Worker 单次 epoll_wait() 最多取出的事件数量。
max_events = 2048

# 每条会话每个转发方向的固定缓冲区容量，单位为字节。
buffer_size = 65536

# 非阻塞连接后端的最大等待时间。
connect_timeout_ms = 3000

# 会话在没有成功读写后允许保持的最长时间。
idle_timeout_seconds = 60

# 指标日志输出周期；设置为 0 可关闭周期指标。
stats_interval_seconds = 10

# debug、info、warn 或 error。
log_level = info

[health_check]
# 主动 TCP 探测周期与单次超时。timeout_ms 必须小于 interval_ms。
interval_ms = 3000
timeout_ms = 800

# 连续失败达到阈值后摘除；连续成功达到阈值后恢复。
failure_threshold = 3
success_threshold = 2

# 每个 [backend 名称] 定义一个可调度节点，名称必须唯一。
[backend app-1]
host = 127.0.0.1
port = 9001
weight = 1

[backend app-2]
host = 127.0.0.1
port = 9002
weight = 2
