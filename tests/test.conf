# 单元测试专用配置：使用独立高位端口和较小资源参数。
[server]
listen_host = 127.0.0.1
listen_port = 18080
workers = 2
backlog = 128
max_events = 256
buffer_size = 8192
connect_timeout_ms = 1000
idle_timeout_seconds = 15
stats_interval_seconds = 0
log_level = debug

[health_check]
interval_ms = 1000
timeout_ms = 100
failure_threshold = 3
success_threshold = 2

# 权重 1:2 用于验证加权最少连接分配比例。
[backend first]
host = 127.0.0.1
port = 19001
weight = 1

[backend second]
host = 127.0.0.1
port = 19002
weight = 2
